apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort # So you can access it on your PC
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007 
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.repository }}:{{ .Values.frontend.tag }}"
        ports:
        - containerPort: 80

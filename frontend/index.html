<!DOCTYPE html>
<html>
<head>
    <style>
        .coin-container { perspective: 1000px; width: 100px; height: 100px; margin: 20px auto; }
        .coin { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; transition: transform 2s; 
        }
        .side { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%; 
            backface-visibility: hidden; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; border: 4px solid gold;
        }
        .heads { background: yellow; }
        .tails { background: silver; transform: rotateY(180deg); }
        
        /* Animation states */
        .flip-heads { transform: rotateY(1800deg); }
        .flip-tails { transform: rotateY(1980deg); }
    </style>
</head>
<body>
    <div class="coin-container">
        <div id="coin" class="coin">
            <div class="side heads">HEADS</div>
            <div class="side tails">TAILS</div>
        </div>
    </div>
    <button onclick="flip()">Flip Coin</button>
    <div id="stats"></div>

    <script>
        async function flip() {
            const res = await fetch('/flip');
            const data = await res.json();
            const coin = document.getElementById('coin');
            
            // Remove old classes and trigger animation
            coin.className = 'coin';
            setTimeout(() => {
                coin.className = 'coin ' + (data.result === 'heads' ? 'flip-heads' : 'flip-tails');
            }, 10);

            document.getElementById('stats').innerText = 
                `Heads: ${data.stats.heads || 0} | Tails: ${data.stats.tails || 0}`;
        }
    </script>
</body>
</html>
